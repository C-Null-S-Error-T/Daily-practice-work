<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transform</title>
    <style>
        .box{
            width: 200px;
            height: 200px;
            background-color: red;
            margin: 20px;
            display:flex;
            flex-direction: column;
        }
        .second{
            width: 100px;
            height: 100px;
            background-color: blue;
            margin: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
        }

        .translate {
            transform: translate(20px, 20px);
        }

        .rotate {
            transform: rotate(15deg);
        }

        .scale {
            transform: scale(1.3);
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="second translate">
            <h3>translate</h3>
        </div>
    </div>
    <div class="box">
        <div class="second rotate">
            <h3>rotate</h3>
        </div>
    </div>
    <div class="box">
        <div class="second scale">
            <h3>scale</h3>
        </div>
    </div>
</body>
</html>
