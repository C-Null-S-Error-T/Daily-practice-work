    <style>
        .boxx {
            border: 3px solid rgb(4, 234, 27);
            background-color: navajowhite;
            width: 300px;
            height: 300px;
        }

        .boll {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: red;
            position: relative;
            /* animation: bounce 2s ease-in-out 1s infinite alternate; */
            animation: bounce 3s ease-in-out 1s infinite alternate ;
        }
        /* @keyframes bounce{
            from{
                left: 0;
            }
            to{
                left: 270px;
                background-color: chartreuse;
            }
        } */
        @keyframes bounce{
            0%{
                top: 0;
                left: 0;
            }
            25%{
                top: 270px;
                left: 270px;
            }
            50%{
                top: 0px;
                left: 270px;
            }
            100%{
                top: 270px;
                left: 270px;
            }
        }
    </style>

</head>

<body>
    <div class="boxx">
        <div class="boll"></div>
    </div>
